<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <button onclick="buscarUsuario()">Buscar</button>

    <input type="text" id="nome" placeholder="Digite seu nome">
    <input type="text" id="email" placeholder="Digite seu email">
    <input type="text" id="senha" placeholder="Digite seu senha">
    <button onclick="cadastrarUsuario()">Cadastrar</button>
    <div id="lista-usuarios"></div>
    
    
    
    
    <script>
        async function buscarUsuario() {
            const resultado = await fetch('http://localhost:3000/usuarios')
            const usuarios = resultado.json();
            renderiazarUsuarios(usuarios)
        }
        
        function renderiazarUsuarios(usuarios){
            const div = document.getElementById("lista-usuarios")
            
            usuarios.forEach(usuario => {
                const card = document.createElement('div')
                card.style.birder = '1px solid #ccc'
                
                card.innerHTML = `<h1>${usuario.email}<h1>`
                div.appendChild(card)
            })
        }
        async function cadastrarUsuario () {

            const body = { nome, email, senha }

            const reultado = await fetch('http://localhost:3000/usuarios', {

            headers: {"Content-Type": "application/jason"}
        })
        const retorno = await resultado.json()
        alert(retorno.mensage)
    }
    </script>
</body>
</html>
